shell = "zsh"

[plugins.powerlevel10k]
github = "romkatv/powerlevel10k"
profiles = ["pre"]

[plugins.zsh-completions]
github = "zsh-users/zsh-completions"
use = ["zsh-completions.plugin.zsh"]
profiles = ["pre"]

[plugins.zsh-autosuggestions]
github = "zsh-users/zsh-autosuggestions"
use = ["zsh-autosuggestions.zsh"]
profiles = ["post"]

[plugins.git-prompt]
github = "woefe/git-prompt.zsh"
use = ["git-prompt.zsh"]
profiles = ["post"]

[plugins.fast-syntax-highlighting]
github = "zdharma-continuum/fast-syntax-highlighting"
profiles = ["post"]

[plugins.ni]
github = "azu/ni.zsh"
use = ["ni.zsh"]
profiles = ["post"]

[plugins.ni.hooks]
post = "compdef _ni ni"

[plugins.fancy-ctrl-z]
remote = "https://gist.githubusercontent.com/yuki-yano/f1f0d11db6d1d49180bca7e282599932/raw/394a57effdd6d033677a82437a20cd6d12d45a57/fancy-ctrl-z.zsh"
use = ["*.zsh"]
profiles = ["post"]

[plugins.show-buffer-stack]
remote = "https://gist.githubusercontent.com/yuki-yano/dc4684c65cf2ba0c2f1612b70d120a34/raw/7652e88d7dbb43ed3f3208f7ca023d1757f2d056/show-buffer-stack.zsh"
use = ["*.zsh"]
profiles = ["post"]

[plugins.show-buffer-stack.hooks]
post = "autoload -Uz add-zsh-hook; add-zsh-hook precmd check-buffer-stack; bindkey '^q' show-buffer-stack"

[plugins.show-suspend-jobs]
remote = "https://gist.githubusercontent.com/yuki-yano/636184c3ca326e19cc76351e34ac3517/raw/c6e133d0ac20940c516e0c2e84690499ec49cf1f/show-suspended-jobs.zsh"
use = ["*.zsh"]
profiles = ["post"]

[plugins.zeno]
inline = """
export ZENO_GIT_CAT="bat --color=always --plain --number"
export ZENO_ENABLE_FZF_TMUX=1
export ZENO_FZF_TMUX_OPTIONS="-p 50%,50%"
export ZENO_DISABLE_EXECUTE_CACHE_COMMAND=1
source "$HOME/repos/github.com/yuki-yano/zeno.zsh/zeno.zsh"
"""
profiles = ["post"]
