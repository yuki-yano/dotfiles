shell = "zsh"

[templates]
defer_source = """{% for file in files %}zsh-defer source "{{ file }}"
{% endfor %}"""
keep_repo = """{% for file in files %}# keep {{ file }}
{% endfor %}"""
defer_fast_syntax_highlighting = """{% for file in files %}zsh-defer -c 'source "{{ file }}"; set_fast_theme'
{% endfor %}"""

[plugins.zsh-defer]
github = "romkatv/zsh-defer"
profiles = ["pre"]

[plugins.zsh-completions]
github = "zsh-users/zsh-completions"
use = ["zsh-completions.plugin.zsh"]
profiles = ["post"]

[plugins.zsh-autosuggestions]
github = "zsh-users/zsh-autosuggestions"
use = ["zsh-autosuggestions.zsh"]
profiles = ["post"]
apply = ["defer_source"]

[plugins.fast-syntax-highlighting]
github = "zdharma-continuum/fast-syntax-highlighting"
profiles = ["post"]
apply = ["defer_fast_syntax_highlighting"]

[plugins.ni]
github = "azu/ni.zsh"
use = ["ni.zsh"]
profiles = ["post"]
apply = ["keep_repo"]

[plugins.zeno-env]
inline = """
export ZENO_GIT_CAT="bat --color=always --plain --number"
export ZENO_ENABLE_FZF_TMUX=1
export ZENO_FZF_TMUX_OPTIONS="-p 50%,50%"
export ZENO_DISABLE_EXECUTE_CACHE_COMMAND=1
"""
profiles = ["post"]

[plugins.zeno-bootstrap]
local = "~/repos/github.com/yuki-yano/zeno.zsh"
use = ["zeno-bootstrap.zsh"]
profiles = ["post"]
