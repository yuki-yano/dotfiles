# @nvim.on_save deno task codex:template -- --apply
model = "gpt-5.6-sol"
# model_context_window = 272000
# model_auto_compact_token_limit = 240000
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
network_access = true
disable_response_storage = true
web_search = "live"

notify = [
  "vde-notifier",
  "--codex",
  "--skip-codex-subagent",
  "--skip-codex-non-interactive"
]
suppress_unstable_features_warning = true
personality = "pragmatic"

[agents]
max_threads = 32
max_depth = 2

[agents.explorer]
description = "Static codebase explorer. Use to locate files, trace code paths, and map architecture before decisions. No edits, runtime diagnosis, review verdicts, or acceptance testing."
config_file = "~/.codex/agents/explorer.toml"

[agents.worker]
description = "Implementation agent. Use after the scope is understood to edit code, refactor, and run change-local tests. It must not independently approve its own work."
config_file = "~/.codex/agents/worker.toml"

[agents.reviewer]
description = "Independent static reviewer. Use after implementation or before merge to find correctness, security, regression, and maintainability issues. No edits or acceptance execution."
config_file = "~/.codex/agents/reviewer.toml"

[agents.verifier]
description = "Independent acceptance verifier. Use to run existing checks and evaluate DoD or behavior claims with evidence. No implementation or fixes."
config_file = "~/.codex/agents/verifier.toml"

[agents.spec_critic]
description = "Pre-implementation specification critic. Use to audit plans and designs for contradictions, missing states, failure handling, and measurable DoD. No edits or implementation."
config_file = "~/.codex/agents/spec_critic.toml"

[agents.diagnostician]
description = "Runtime diagnosis agent. Use for observed bugs involving logs, processes, browsers, tmux, OS state, or reproduction. No source edits or final review verdicts."
config_file = "~/.codex/agents/diagnostician.toml"

[features]
unified_exec = true
view_image_tool = true
shell_snapshot = true
steer = true
skills = true
collaboration_modes = true
apps = true
multi_agent = true
# voice_transcription = true
default_mode_request_user_input = true
responses_websockets_v2 = true
fast_mode = true
js_repl = true
hooks = true
plugin_hooks = true

[features.multi_agent_v2]
hide_spawn_agent_metadata = false
tool_namespace = "agents"

[tui]
status_line = ["model-with-reasoning", "git-branch", "context-remaining", "context-window-size", "fast-mode", "weekly-limit", "five-hour-limit"]
theme = "catppuccin-mocha"
terminal_title = []

[mcp_servers.chrome-devtools]
command = "npx"
args = [
  "-y",
  "chrome-devtools-mcp@latest",
  "--auto-connect",
  "--no-usage-statistics"
]
startup_timeout_sec = 20
tool_timeout_sec = 120
enabled = true


[plugins."github@openai-curated"]
enabled = true

[plugins."superpowers@openai-curated"]
enabled = true

[plugins."browser-use@openai-bundled"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."context-mode@context-mode"]
enabled = false

[marketplaces.openai-bundled]
last_updated = "2026-04-24T03:46:51Z"
source_type = "local"
source = "~/.codex/.tmp/bundled-marketplaces/openai-bundled"

[marketplaces.openai-primary-runtime]
last_updated = "2026-04-24T03:45:21Z"
source_type = "local"
source = "~/.cache/codex-runtimes/codex-primary-runtime/plugins/openai-primary-runtime"

[marketplaces.context-mode]
source_type = "git"
source = "https://github.com/mksglu/context-mode.git"
