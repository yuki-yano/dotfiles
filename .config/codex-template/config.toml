# @nvim.on_save deno task codex:template -- --apply
model = "gpt-5.5"
model_context_window = 1000000
model_auto_compact_token_limit = 950000
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
network_access = true
disable_response_storage = true
web_search = "live"
notify = [
  "vde-notifier",
  "--codex",
  "--skip-codex-subagent",
  "--skip-codex-non-interactive"
]
suppress_unstable_features_warning = true
personality = "pragmatic"

[agents]
max_threads = 32
max_depth = 2

[agents.explorer]
description = "Codebase research agent. Use for all code investigation, no edits."
config_file = "~/.codex/agents/explorer.toml"

[agents.worker]
description = "Coding and bug fix agent. Use for implementation, refactoring, and running tests."
config_file = "~/.codex/agents/worker.toml"

[features]
unified_exec = true
view_image_tool = true
shell_snapshot = true
steer = true
skills = true
collaboration_modes = true
apps = true
multi_agent = true
# voice_transcription = true
default_mode_request_user_input = true
responses_websockets_v2 = true
fast_mode = true
code_mode = true
js_repl = true
codex_hooks = true

[tui]
status_line = ["model-with-reasoning", "git-branch", "context-usage", "fast-mode", "context-window-size", "five-hour-limit", "weekly-limit"]
theme = "catppuccin-mocha"
terminal_title = []

[plugins."github@openai-curated"]
enabled = true

[plugins."browser-use@openai-bundled"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[marketplaces.openai-bundled]
last_updated = "2026-04-24T03:46:51Z"
source_type = "local"
source = "~/.codex/.tmp/bundled-marketplaces/openai-bundled"

[marketplaces.openai-primary-runtime]
last_updated = "2026-04-24T03:45:21Z"
source_type = "local"
source = "~/.cache/codex-runtimes/codex-primary-runtime/plugins/openai-primary-runtime"
