multiplexer:
  backend: tmux
screen:
  image:
    backend: alacritty
dangerKeys:
  - C-c
  - C-d
  - C-z
dangerCommandPatterns: []
launch:
  agents:
    codex:
      options:
        - --yolo
    claude:
      options:
        - --dangerously-skip-permissions
workspaceTabs:
  displayMode: all

notifications:
  pushEnabled: true
  enabledEventTypes:
    - pane.waiting_permission
    - pane.task_completed
