multiplexer:
  backend: tmux
screen:
  image:
    backend: alacritty
dangerKeys:
  - C-c
  - C-d
  - C-z
dangerCommandPatterns: []
launch:
  agents:
    codex:
      options:
        - --yolo
    claude:
      options:
        - --dangerously-skip-permissions
workspaceTabs:
  displayMode: all

notifications:
  pushEnabled: true
  enabledEventTypes:
    - pane.waiting_permission
    - pane.task_completed
  summary:
    enabled: true
    rename:
      pane: true
      push: true
    sources:
      codex:
        enabled: true
        waitMs: 7000
        engine:
          agent: codex
          model: gpt-5.3-codex-spark
          effort: low
      claude:
        enabled: true
        waitMs: 20000
        engine:
          agent: codex
          model: gpt-5.3-codex-spark
          effort: low
