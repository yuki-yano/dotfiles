# Catppuccin Mocha / 色相ゾーニング × 低明度アクティブ (pane25 案A hue-zones)
# category: mauve系chip active #4c3d6e + #cba6f7 / inactive #332c46 + #a495c2
# statusline session active: #4d5080 + bold + fg #e8ecfb / inactive: surface0 #313244
# sidebar/filter active: lavender tint #434662

daemon:
  poll_ms: 2000
  done_clear_on: pane

statusline:
  session_badge:
    mode: counts
    chip:
      bg: "#313244"
      cap_left: ""
      cap_right: ""
  sessions:
    show_index: false
    fixed_width: true
    badge_style: chip
    separator: "#[fg=#585b70] #[default]"
    current:
      format: " #[fg=#f5e0dc]{index}#[fg=#e8ecfb]: {session} "
      bold: true
      colors:
        fg: "#e8ecfb"
        bg: "#4d5080"
      prefix: "#[fg=#4d5080]#[default]"
      suffix: "#[fg=#4d5080]#[default]"
    other:
      format: " {index}: {session} "
      colors:
        fg: "#a6adc8"
        bg: "#313244"
      prefix: "#[fg=#313244]#[default]"
      suffix: "#[fg=#313244]#[default]"
  category:
    mode: list
    format: " {badge}{category}  "
    inactive_format: " {badge}{category}  "
    badge_style: chip
    bold: false
    agent_badge:
      enabled: true
      mode: counts
    colors:
      fg: "#cba6f7"
      bg: "#4c3d6e"
    inactive_colors:
      fg: "#a495c2"
      bg: "#332c46"
    prefix: " #[fg=#4c3d6e]#[default]"
    suffix: "#[fg=#4c3d6e]#[default] "
    inactive_prefix: " #[fg=#332c46]#[default]"
    inactive_suffix: "#[fg=#332c46,bg=default]#[default] "
  windows:
    separator: ""
    agent_badge:
      enabled: false
    current:
      format: " {index}:{window} "
      bold: true
      colors:
        fg: "#cdd6f4"
      prefix: "#[fg=#b4befe]▍"
      suffix: "#[fg=#1e1e2e,bg=default]#[default]"
    other:
      format: " {index}:{window} "
      colors:
        fg: "#7f849c"
      prefix: "#[fg=#1e1e2e]"
      suffix: "#[fg=#1e1e2e,bg=default]#[default]"
    bell:
      fg: "#f38ba8"
    activity:
      fg: "#f38ba8"
  panes:
    current:
      format: " {pane}  {detail} "
      colors:
        fg: "#cdd6f4"
        bg: "#45475a"
        outer_bg: "#1e1e2e"
      prefix: "#[fg=#45475a,bg=#1e1e2e]"
      suffix: "#[fg=#45475a,bg=#1e1e2e]#[default]"
    other:
      format: " {pane} #[fg=#6c7086]#[fg=#a6adc8] {detail} "
      colors:
        fg: "#a6adc8"
        bg: "#313244"
        outer_bg: "#1e1e2e"
      prefix: "#[fg=#313244,bg=#1e1e2e]"
      suffix: "#[fg=#313244,bg=#1e1e2e]#[default]"
  summary:
    hide_idle: false
  attention:
    format: "{attention}"
    colors:
      fg: "#f38ba8"

badge:
  colors:
    blocked: "#f38ba8"
    working: "#a6e3a1"
    done: "#89b4fa"
    idle: "#a6adc8"

categories:
  display_names:
    private: "󰠦"
    public: "󰖟"
    work: "󰳰"
  order:
    private: 10
    public: 20
    work: 30
  default_category: public
  rules:
    - category: private
      path_patterns:
        - github.com/yuki-yano/agent-private-workflow
        - github.com/yuki-yano/mf-dashboard
        - github.com/yuki-yano/obsidian-sync
    - category: work
      path_patterns:
        - github.com/${WORK_GHQ_OWNER}/*
        - github.com/${WORK_GHQ_OWNER}/**
  session_name_rules:
    - category: private
      patterns:
        - dotfiles

sidebar:
  width: "10%"
  header:
    format: " {label} ▾ "
    prefix: ""
    suffix: ""
    bold: true
    chip_prefix: ""
    chip_suffix: ""
    colors:
      fg: "#b4befe"
      bg: "reset"
  live:
    lines: 20
  colors:
    action_icon: "#74c7ec"
    badge_blocked: "#f38ba8"
    badge_working: "#a6e3a1"
    badge_done: "#89b4fa"
    badge_idle: "#6c7086"
    header_chip_fg: "#cdd6f4"
    header_filter_bg: "#434662"
    header_total_bg: "reset"
    header_total_fg: "reset"
    header_mode: "#434662"
    active_bg: "#313244"
    active_bar: "#b4befe"
    toggle: "#b4befe"
    selection_bg: "#2c2e40"
    category: "#cba6f7"
    branch: "#fab387"
    detail: "#7f849c"
    marker: "#585b70"
    repo: "#a8c3f7"
    task_working: "#f9e2af"
    task_done: "#89b4fa"
    task_pending: "#585b70"
    task_label: "#9399b2"
    subagent_label: "#74c7ec"
    subagent_id: "#74c7ec"
    worktree: "#94e2d5"
    worktree_activity: "#94e2d5"
