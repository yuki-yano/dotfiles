# Default
set -g prefix C-y
bind -T prefix C-y send-keys C-y

set -g  default-terminal "tmux-256color"
set -as terminal-features 'xterm-256color:RGB'
set -ag terminal-overrides ",*256col*:Tc"
set -sg escape-time 0
set  -g history-limit 10000
set  -g status-interval 10

set  -g base-index 1
set  -g pane-base-index 1
set  -g status-position top
setw -g mode-keys vi
set  -g mouse on
set  -g focus-events on
set -s set-clipboard off

# Reload
bind R run-shell 'tmux source-file ~/.tmux.conf && tmux display-message "Tmux config reloaded!"'

# Process Check
is_zsh="#{==:#{pane_current_command},zsh}"
is_vim="case '#{pane_current_command}' in gview|gvim|view|vim|vimdiff|vi|nvi|nvim|nvimdiff|vimx|nvimx|nvimxdiff) exit 0 ;; node|claude) ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^[:space:]]*\\+\\s+(\\S+/)?g?(view|n?vim?x?)(diff)?$' ;; *) exit 1 ;; esac"
is_fzf="#{==:#{pane_current_command},fzf}"
is_zsh_or_fzf="#{||:#{==:#{pane_current_command},zsh},#{==:#{pane_current_command},fzf}}"
is_smart_switch_target="#{||:#{||:#{==:#{pane_current_command},node},#{==:#{pane_current_command},claude}},#{==:#{pane_current_command},codex}}"

# Binding

## Move Pane
# Standard pane movement (fallback)
bind -T prefix h select-pane -L
bind -T prefix j select-pane -D
bind -T prefix k select-pane -U
bind -T prefix l select-pane -R

## Move Window
bind -T prefix c   new-window
bind -n M-c        if-shell "$is_vim" 'send-keys M-c' 'new-window -c "#{pane_current_path}"'
bind -T prefix n   next-window
bind -T prefix p   previous-window
bind -n M-j        next-window
bind -n M-k        previous-window
bind -n M-z        resize-pane -Z

## Split Window
bind -T prefix v split-window -h  -c "#{pane_current_path}"
bind -T prefix s split-window -v  -c "#{pane_current_path}"
bind -n M-v      if-shell "$is_vim" 'send-keys M-v' 'split-window -h  -c "#{pane_current_path}"'
bind -n M-s      split-window -v  -c "#{pane_current_path}"
bind -T prefix V split-window -fh -c "#{pane_current_path}"
bind -T prefix S split-window -fv -c "#{pane_current_path}"
bind -T prefix 3 split-window -h  -c "#{pane_current_path}" -l 66%
bind -T prefix 4 split-window -h  -c "#{pane_current_path}" -l 75%

## Resize Pane
bind -r -T prefix H resize-pane -L 5
bind -r -T prefix L resize-pane -R 5
bind -r -T prefix J resize-pane -D 5
bind -r -T prefix K resize-pane -U 5
bind -n M-Left  resize-pane -L 2
bind -n M-Right resize-pane -R 2
bind -n M-Down  resize-pane -D 2
bind -n M-Up    resize-pane -U 2

## Swap Panes
# Toggle mark/swap functionality
bind-key -T prefix m run-shell 'tmux-swap-pane'
bind-key -n M-m      run-shell 'tmux-swap-pane'

## Clear History
bind -T prefix C-c clear-history

## Move Session
bind -n M-C new-session -c '~/'
bind -n M-l switch-client -n
bind -n M-h switch-client -p
bind -n M-1 run-shell 'vtm statusline-sessions switch 1'
bind -n M-2 run-shell 'vtm statusline-sessions switch 2'
bind -n M-3 run-shell 'vtm statusline-sessions switch 3'
bind -n M-4 run-shell 'vtm statusline-sessions switch 4'
bind -n M-5 run-shell 'vtm statusline-sessions switch 5'
bind -n M-6 run-shell 'vtm statusline-sessions switch 6'
bind -n M-7 run-shell 'vtm statusline-sessions switch 7'
bind -n M-8 run-shell 'vtm statusline-sessions switch 8'
bind -n M-9 run-shell 'vtm statusline-sessions switch 9'
set-hook -g client-session-changed 'run-shell "tmux refresh-client -S"'

## Detach
bind -n M-d detach

## Move Selection
bind -T prefix a   choose-tree
bind -T prefix e   choose-session
bind -T prefix w   choose-tree -w
bind -T prefix C-a choose-tree
bind -T prefix C-e choose-session
bind -T prefix C-w choose-tree -w

## Copy Mode
bind -n M-'[' copy-mode
bind -n M-'{' display-popup -E "tmux capture-pane -pS -32768 | TMUX_YANK=1 nvim -"

bind -T copy-mode-vi C-a send-keys -X start-of-line
bind -T copy-mode-vi C-e send-keys -X end-of-line
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi V   send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Y {
  send-keys -X copy-pipe-and-cancel "zsh -c 'if command -v editprompt >/dev/null; then editprompt collect --target-pane #{pane_id} --output stdout --no-quote; else cat; fi' | pbcopy"
}
bind -T copy-mode-vi Enter {
  send-keys -X copy-pipe-and-cancel "zsh -c 'if command -v editprompt >/dev/null; then editprompt collect --target-pane #{pane_id} --output stdout --no-quote; else cat; fi' | pbcopy"
}
bind -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi s run-shell -C "display-popup -E -B -x '##{popup_pane_left}' -y '##{popup_pane_top}' -w '#{pane_width}' -h '#{pane_height}' 'tmux-fuzzy-motion popup-live #{pane_id}'"
bind -T copy-mode-vi WheelUpPane   select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 1 scroll-down

bind -n WheelUpPane if-shell -F "#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}" {
  send-keys -M
} {
  copy-mode -e
  send-keys -X -N 1 scroll-up
}

bind -n M-']' run "pbpaste | tr -d '\n' | tmux load-buffer - && tmux paste-buffer"
bind -n M-'}' run "pbpaste | tmux load-buffer - && tmux paste-buffer"
bind -T prefix ] run "pbpaste | tr -d '\n' | tmux load-buffer - && tmux paste-buffer"
bind -T prefix '}' run "pbpaste | tmux load-buffer - && tmux paste-buffer"

# tmux.nvim integration
bind -n C-h if-shell "$is_vim" 'send-keys C-h' {
  if -F "$is_zsh_or_fzf" 'send-keys C-h' {
    if -F "$is_smart_switch_target" 'run-shell "tmux-smart-switch-pane left"' {
      if -F '#{pane_at_left}' '' 'run-shell "tmux-smart-switch-pane left"'
    }
  }
}

bind -n C-j if-shell "$is_vim" 'send-keys C-j' {
  if -F "$is_zsh_or_fzf" 'send-keys C-j' {
    if -F "$is_smart_switch_target" 'run-shell "tmux-smart-switch-pane down"' {
      if -F '#{pane_at_bottom}' '' 'run-shell "tmux-smart-switch-pane down"'
    }
  }
}

bind -n C-k if-shell "$is_vim" 'send-keys C-k' {
  if -F "$is_zsh_or_fzf" 'send-keys C-k' {
    if -F "$is_smart_switch_target" 'run-shell "tmux-smart-switch-pane up"' {
      if -F '#{pane_at_top}' '' 'run-shell "tmux-smart-switch-pane up"'
    }
  }
}

bind -n C-l if-shell "$is_vim" 'send-keys C-l' {
  if -F "$is_fzf" 'send-keys C-l' 'run-shell "tmux-smart-switch-pane right"'
}

bind -n M-i run-shell 'tmux split-window -v -l 22 -c "#{pane_current_path}" "editprompt open --target-pane #{pane_id}"'
bind -n M-r run-shell 'vtm session-manager'
bind -n M-t run-shell "ghq-project-selector.zsh --from-run-shell"
bind -n M-u run-shell 'tmux-toggle-transparency'

bind -T copy-mode-vi C-h if -F '#{pane_at_left}'   '' 'select-pane -L'
bind -T copy-mode-vi C-j if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind -T copy-mode-vi C-k if -F '#{pane_at_top}'    '' 'select-pane -U'
bind -T copy-mode-vi C-l if -F '#{pane_at_right}'  '' 'select-pane -R'

bind -T prefix C-l send-keys C-l
bind -n C-s        if -F "$is_zsh" 'send-keys C-l' 'send-keys C-s'

# Status Line
set -g status-fg "#c6c6c6"
set -g status-bg "#3a3a3a"

set -gq @theme_mode "transparent"
run-shell 'tmux-toggle-transparency apply'

set -g pane-border-lines single
# set -g pane-active-border-lines single

set -g status-left-length  150
set -g status-right-length 150
set -g status-left "#(vtm statusline-sessions --show-index) #[default]"

setw -g window-status-current-format "#[fg=#89B4FA,bg=#3a3a3a,nobold]#[fg=#1C1C1C,bg=#89B4FA,bold]#I #W#[fg=#89B4FA,bg=#3a3a3a,nobold]#[default]"
setw -g window-status-format " #[fg=#7F849C,bg=#3a3a3a,nobold]#I #W #[default]"

set -g status-right '#{?#{==:#{QUICK_IME},1},,#[fg=#303030#,bg=#3a3a3a]#[fg=white#,bg=#303030] #[fg=#45475A#,bg=#303030]#[fg=white#,bg=black] #(wifi) #[fg=white#,bg=black]#(battery) }'
set -g status-justify left

set-option -g pane-border-status bottom
set-option -g pane-border-format "\
#{?pane_active,\
#[fg=#8295D1]#[bg=#1C1C1C]#[nobold]\
#[fg=#1E1E2E]#[bg=#8295D1]#[nobold] #I.#P \
#[fg=#1E1E2E] #(tmux-pwd #{pane_current_path}) \
 #{pane_current_command} \
#[fg=#8295D1]#[bg=#1C1C1C]#[nobold]#[default],\
#[fg=#373A56]#[bg=#1C1C1C]#[nobold]\
#[fg=#BDC4E3]#[bg=#373A56]#[nobold] #I.#P \
#[fg=#9696CE] #(tmux-pwd #{pane_current_path}) \
 #{pane_current_command} \
#[fg=#373A56]#[bg=#1C1C1C]#[nobold]#[default]}"

## Right Click Menu
bind -n MouseDown3Pane if-shell -F -t = "#{||:#{mouse_any_flag},#{&&:#{pane_in_mode},#{?#{m/r:(copy|view)-mode,#{pane_mode}},0,1}}}" {
  select-pane -t =
  send-keys -M
} {
  display-menu -T "#[align=centre]#{pane_index} (#{pane_id})" -t = -x M -y M \
    "#{?#{m/r:(copy|view)-mode,#{pane_mode}},Go To Top,}" < { send-keys -X history-top } \
    "#{?#{m/r:(copy|view)-mode,#{pane_mode}},Go To Bottom,}" > { send-keys -X history-bottom } \
    '' \
    "#{?mouse_word,Search For #[underscore]#{=/9/...:mouse_word},}" C-r { if-shell -F "#{?#{m/r:(copy|view)-mode,#{pane_mode}},0,1}" "copy-mode -t=" ; send-keys -X -t = search-backward -- "#{q:mouse_word}" } \
    "#{?mouse_word,Type #[underscore]#{=/9/...:mouse_word},}" C-y { copy-mode -q ; send-keys -l "#{q:mouse_word}" } \
    "#{?mouse_word,Copy #[underscore]#{=/9/...:mouse_word},}" c { copy-mode -q ; set-buffer "#{q:mouse_word}" } \
    "#{?mouse_line,Copy Line,}" l { copy-mode -q ; set-buffer "#{q:mouse_line}" } \
    '' \
    "#{?mouse_hyperlink,Type #[underscore]#{=/9/...:mouse_hyperlink},}" C-h { copy-mode -q ; send-keys -l "#{q:mouse_hyperlink}" } \
    "#{?mouse_hyperlink,Copy #[underscore]#{=/9/...:mouse_hyperlink},}" h { copy-mode -q ; set-buffer "#{q:mouse_hyperlink}" } \
    '' \
    "Horizontal Split" h { split-window -h } \
    "Vertical Split" v { split-window -v } \
    '' \
    "#{?#{>:#{window_panes},1},,-}Swap Up" u { swap-pane -U } \
    "#{?#{>:#{window_panes},1},,-}Swap Down" d { swap-pane -D } \
    "#{?pane_marked_set,,-}Swap Marked" s { swap-pane } \
    '' \
    "Respawn Pane" R { respawn-pane -k } \
    "#{?pane_marked,Unmark,Mark}" m { select-pane -m } \
    "#{?#{>:#{window_panes},1},,-}#{?window_zoomed_flag,Unzoom,Zoom}" z { resize-pane -Z } \
    '' \
    "Kill Pane" X { run-shell "vtm session-manager kill-pane #{q:pane_id}" } \
    "Kill Window" W { run-shell "vtm session-manager kill-window #{q:window_id}" }
}

if "test -e ~/.tmux.conf.local" "source ~/.tmux.conf.local"
